name: Build Android app

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android packages
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.22.1"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Create temporary CI release keystore
        run: |
          keytool -genkeypair \
            -keystore app/release.keystore \
            -storepass nekospeak123 \
            -alias nekospeak \
            -keypass nekospeak123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=NekoSpeak CI,O=NekoSpeak,C=IN" \
            -noprompt

      - name: Build release APKs
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NekoSpeak-release-apks
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
          if-no-files-found: error
          retention-days: 30
